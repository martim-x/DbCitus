# ==========================================================
# postgresql-locker
# ==========================================================
---
# ----------------------------------------------------------
# service
# ----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
    name: pg-locker
    namespace: citus
spec:
    selector:
        app: pg-locker
    ports:
        - port: 5432
          targetPort: 5432


# ----------------------------------------------------------
# statefulset
# ----------------------------------------------------------
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: pg-locker
    namespace: citus
spec:
    serviceName: pg-locker
    replicas: 1
    selector:
        matchLabels:
            app: pg-locker
    template:
        metadata:
            labels:
                app: pg-locker
        spec:
            containers:
                - name: postgres
                  image: postgres:latest
                  ports:
                      - containerPort: 5432
                  env:
                      - name: POSTGRES_DB
                        value: "postgres"
                      - name: POSTGRES_USER
                        value: "postgres"
                      - name: POSTGRES_PASSWORD
                        value: "111"
                  volumeMounts:
                      - name: data
                        mountPath: /var/lib/postgresql
    volumeClaimTemplates:
        - metadata:
              name: data
          spec:
              accessModes:
                  - ReadWriteOnce
              storageClassName: pg-locker-storage
              resources:
                  requests:
                      storage: 5Gi
