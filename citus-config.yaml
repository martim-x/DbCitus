# ==========================================================
# namespace
# ==========================================================
apiVersion: v1
kind: Namespace
metadata:
    name: citus

---
# ==========================================================
# storageclass
# ==========================================================

---
# ----------------------------------------------------------
# citus-coordinator-x-storage
# ----------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
    name: citus-coordinator-1-storage
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
allowVolumeExpansion: false

---
apiVersion: storage.k8s.io/v1
