# ==========================================================
# citus-coordinator-1
# ==========================================================

---
# ----------------------------------------------------------
# service
# ----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
    name: citus-coordinator-1
    namespace: citus
spec:
    selector:
        app: citus-coordinator-1
    ports:
        - port: 5432
          targetPort: 5432

---
# ----------------------------------------------------------
# statefulset
# ----------------------------------------------------------
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: citus-coordinator-1
    namespace: citus
spec:
    serviceName: citus-coordinator-1
    replicas: 1
    selector:
        matchLabels:
            app: citus-coordinator-1
    template:
        metadata:
            labels:
                app: citus-coordinator-1
        spec:
            containers:
                - name: citus-coordinator-1
                  image: citusdata/citus:latest
                  ports:
                      - containerPort: 5432
                  env:
                      - name: POSTGRES_USER
                        value: "postgres"
                      - name: POSTGRES_PASSWORD
                        value: "111"
                      - name: PGUSER
                        value: "postgres"
                      - name: PGPASSWORD
                        value: "111"
                  volumeMounts:
                      - name: data
                        mountPath: /var/lib/postgresql/18/docker
    volumeClaimTemplates:
        - metadata:
              name: data
          spec:
              accessModes:
                  - ReadWriteOnce
              storageClassName: citus-coordinator-1-storage
              resources:
                  requests:
                      storage: 10Gi


